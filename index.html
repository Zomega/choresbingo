<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cleaning Bingo!</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "i18next": "https://esm.sh/i18next",
          "i18next-http-backend": "https://esm.sh/i18next-http-backend"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-container">
      <h1>Cleaning Bingo!</h1>

      <template id="tile-template">
        <div class="tile"></div>
      </template>

      <template id="player-list-item-template">
        <li>
          <div class="status-dot online"></div>
          <span class="player-name-text"></span>
        </li>
      </template>

      <template id="racer-template">
        <div class="racer-icon">
          <span class="racer-emoji"></span>
          <span class="racer-label"></span>
        </div>
      </template>

      <button id="connection-fab" class="fab" title="Invite Others">
        <span class="material-symbols-rounded">qr_code_2</span>
      </button>

      <button id="profile-fab" class="fab" title="Change Profile">
        <span class="material-symbols-rounded">person</span>
      </button>

      <button id="settings-fab" class="fab" title="Settings">
        <span class="material-symbols-rounded">settings</span>
      </button>

      <div id="connection-modal" class="hidden modal">
        <div class="popup">
          <button class="close-btn" data-tooltip="Close">
            <span class="material-symbols-rounded">close</span>
          </button>
          <div id="connection-status" class="connection-status-badge">
            <span class="status-dot" id="connection-status-dot"></span>
            <span id="connection-status-text">Connecting...</span>
          </div>
          <p id="connection-room-code"></p>
          <button
            id="connection-share-button"
            class="icon-btn"
            data-tooltip="Share Link"
          >
            <span id="connection-share-icon" class="material-symbols-rounded"
              >share</span
            >
          </button>
          <div id="connection-qrcode"></div>
          <div id="connection-players">
            Cleaning Crew:
            <ul id="player-list"></ul>
          </div>
        </div>
      </div>

      <div id="profile-modal" class="hidden modal">
        <div class="popup">
          <button class="close-btn">
            <span class="material-symbols-rounded">close</span>
          </button>
          <h3 id="profile-modal-title">Profile</h3>

          <input
            type="text"
            id="profile-name-input"
            placeholder="Enter your name..."
            maxlength="12"
          />

          <div class="icon-grid" id="profile-icon-selector"></div>

          <button
            id="profile-save-button"
            class="icon-btn"
            data-tooltip="Save & Update"
          >
            <span class="material-symbols-rounded">save</span>
          </button>
        </div>
      </div>

      <div id="settings-modal" class="hidden modal">
        <div class="popup">
          <button class="close-btn">
            <span class="material-symbols-rounded">close</span>
          </button>
          <h3 id="settings-modal-title">Settings</h3>

          <div id="settings-lil-gui"></div>

          <div
            class="settings-actions"
            style="
              margin-top: 20px;
              display: flex;
              flex-direction: column;
              gap: 10px;
            "
          >
            <button
              id="settings-save-button"
              class="icon-btn"
              data-tooltip="Save & Update"
              style="width: 100%"
            >
              <span class="material-symbols-rounded">save</span>
            </button>

            <button
              id="nuke-button"
              class="icon-btn danger"
              style="width: 100%; background-color: #d32f2f"
            >
              <span
                class="material-symbols-rounded"
                style="vertical-align: middle"
                >delete_forever</span
              >
              Delete All Local Data
            </button>

            <button
              id="privacy-link"
              style="
                background: none;
                border: none;
                padding: 0;
                margin-top: 10px;
                font-size: 0.8rem;
                color: var(--text);
                text-decoration: underline;
                opacity: 0.7;
                cursor: pointer;
              "
            >
              Privacy Policy
            </button>
          </div>
        </div>
      </div>

      <div id="privacy-modal" class="hidden modal">
        <div
          class="popup"
          style="
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            text-align: left;
          "
        >
          <button class="close-btn">
            <span class="material-symbols-rounded">close</span>
          </button>
          <div id="privacy-content-target">
            <p>Loading Privacy Policy...</p>
          </div>
        </div>
      </div>

      <div id="onboarding-modal" class="hidden modal">
        <div class="popup">
          <h2 id="onboarding-headline"></h2>
          <p
            id="onboarding-copy"
            style="white-space: pre-line; margin: 20px 0"
          ></p>
          <button
            id="onboarding-action"
            class="icon-btn"
            style="width: 100%"
          ></button>
        </div>
      </div>

      <div class="bingo-grid"></div>
      <div class="racetrack-container">
        <div class="track">
          <div class="progress" style="width: 0%"></div>
          <span class="start-line">🌪️</span>
          <span class="finish-line">🏁</span>
        </div>
      </div>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
